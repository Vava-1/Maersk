# AfriSwarm — Kubernetes Secrets Template
# Replace values with base64-encoded strings: echo -n "value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: afriswarm-secrets
  namespace: afriswarm
type: Opaque
data:
  # echo -n "afriswarm" | base64
  postgres-user: YWZyaXN3YXJt
  # echo -n "YOUR_STRONG_PASSWORD" | base64
  postgres-password: WUVSX1NUUk9OR19QQVNTV09SRA==
  # echo -n "postgresql://afriswarm:YOUR_STRONG_PASSWORD@postgres:5432/afriswarm_db" | base64
  database-url: cG9zdGdyZXNxbDovL2Fmcmlzd2FybTpZT1VSX1NUUk9OR19QQVNTV09SREBwb3N0Z3Jlczov...
  # echo -n "sk-..." | base64
  openai-api-key: c2stLi4u
  # echo -n "your-secret-key-here" | base64
  secret-key: eW91ci1zZWNyZXQta2V5LWhlcmU=
---
# HPA: Scale backend based on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: afriswarm-backend-hpa
  namespace: afriswarm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: afriswarm-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
