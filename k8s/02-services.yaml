# ── AfriSwarm Backend ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: afriswarm-backend
  namespace: afriswarm
  labels:
    app: afriswarm-backend
    version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: afriswarm-backend
  template:
    metadata:
      labels:
        app: afriswarm-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/vava-1/maersk-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: afriswarm-secrets
                  key: database-url
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: afriswarm-secrets
                  key: openai-api-key
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: afriswarm-secrets
                  key: secret-key
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: afriswarm-backend
  namespace: afriswarm
spec:
  selector:
    app: afriswarm-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
# ── AfriSwarm Frontend ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: afriswarm-frontend
  namespace: afriswarm
  labels:
    app: afriswarm-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: afriswarm-frontend
  template:
    metadata:
      labels:
        app: afriswarm-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/vava-1/maersk-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_URL
              value: /api/v1
            - name: VITE_WS_URL
              value: /api/v1/ws
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: afriswarm-frontend
  namespace: afriswarm
spec:
  selector:
    app: afriswarm-frontend
  ports:
    - port: 80
      targetPort: 80
---
# ── Ingress (NGINX) ─────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: afriswarm-ingress
  namespace: afriswarm
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "afriswarm-backend"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - afriswarm.yourdomain.com
      secretName: afriswarm-tls
  rules:
    - host: afriswarm.yourdomain.com
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: afriswarm-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: afriswarm-frontend
                port:
                  number: 80
