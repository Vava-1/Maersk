"""
AfriSwarm Maersk Resilience Swarm - Docker Compose
Production-ready deployment with PostgreSQL, Redis, Kafka, and all services.
"""
version: '3.8'

services:
  # ── Frontend + Backend ─────────────────────
  afriswarm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afriswarm-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://afriswarm:secure_password@postgres:5432/afriswarm
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SECRET_KEY=${SECRET_KEY:-afriswarm-secret-key-change-in-production}
      - LLM_PROVIDER=local
      - LOCAL_MODEL_URL=http://ollama:11434
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=secure_password
      - LOG_LEVEL=INFO
      - WORKERS=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - afriswarm-network
    volumes:
      - ./uploads:/app/uploads
      - ./checkpoints:/app/checkpoints
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # ── PostgreSQL + PGVector ──────────────────
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: afriswarm-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=afriswarm
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_DB=afriswarm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afriswarm -d afriswarm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - afriswarm-network

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: afriswarm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - afriswarm-network

  # ── Kafka (Redpanda) ──────────────────────
  kafka:
    image: redpandadata/redpanda:v23.3.5
    container_name: afriswarm-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://kafka:9092,external://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
    volumes:
      - kafka-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - afriswarm-network

  # ── Neo4j (Knowledge Graph) ──────────────
  neo4j:
    image: neo4j:5.15-community
    container_name: afriswarm-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/secure_password
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - afriswarm-network

  # ── Prometheus ───────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: afriswarm-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - afriswarm-network

  # ── Grafana ──────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    container_name: afriswarm-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=afriswarm-grafana-2026
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources
    networks:
      - afriswarm-network

  # ── Ollama (Local LLM - optional) ────────
  ollama:
    image: ollama/ollama:0.1.17
    container_name: afriswarm-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
    networks:
      - afriswarm-network
    profiles:
      - llm

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  neo4j-data:
  neo4j-logs:
  prometheus-data:
  grafana-data:
  ollama-data:

networks:
  afriswarm-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
