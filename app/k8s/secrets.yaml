# Generate secrets with: kubectl apply -f k8s/secrets.yaml
# IMPORTANT: Change all default passwords before deploying to production!
apiVersion: v1
kind: Secret
metadata:
  name: afriswarm-secrets
  namespace: afriswarm
type: Opaque
stringData:
  secret-key: "afriswarm-production-secret-key-change-this"
  db-user: "afriswarm"
  db-password: "change-this-password"
  neo4j-password: "change-this-password"
  admin-password: "afriswarm-admin-2026"
