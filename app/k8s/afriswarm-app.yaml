apiVersion: apps/v1
kind: Deployment
metadata:
  name: afriswarm-app
  namespace: afriswarm
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: afriswarm
  template:
    metadata:
      labels:
        app: afriswarm
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: afriswarm-sa
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: afriswarm
          image: afriswarm/maersk-swarm:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres:5432/afriswarm"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: NEO4J_URI
              value: "bolt://neo4j:7687"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: WORKERS
              value: "4"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: afriswarm-secrets
                  key: secret-key
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: afriswarm-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: afriswarm-secrets
                  key: db-password
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: afriswarm-secrets
                  key: neo4j-password
            - name: LLM_PROVIDER
              value: "local"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: afriswarm
  namespace: afriswarm
spec:
  type: ClusterIP
  selector:
    app: afriswarm
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: afriswarm-sa
  namespace: afriswarm
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: afriswarm-ingress
  namespace: afriswarm
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - afriswarm.yourdomain.com
      secretName: afriswarm-tls
  rules:
    - host: afriswarm.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: afriswarm
                port:
                  number: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: afriswarm-hpa
  namespace: afriswarm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: afriswarm-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
