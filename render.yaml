services:
  - type: web
    name: afriswarm-web
    env: docker
    region: frankfurt
    plan: starter
    dockerfilePath: app/Dockerfile
    dockerContext: app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afriswarm-db
          property: connectionString
      - key: REDIS_URL
        value: "redis://redishost:6379" # Replace with actual managed Redis URL
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: "kafkahost:9092" # Replace with actual managed Kafka URL
      - key: SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: "openai" # Recommended for cloud deployment without heavy local GPU
      - key: OPENAI_API_KEY
        sync: false # User must set this in Render dashboard

databases:
  - name: afriswarm-db
    databaseName: afriswarm
    user: afriswarm
    region: frankfurt
    plan: starter
