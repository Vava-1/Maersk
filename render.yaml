services:
  - type: web
    name: afriswarm-web
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: app/Dockerfile
    dockerContext: app
    envVars:
      - key: DATABASE_URL
        sync: false # Set your existing Render DB Internal URL or an external Postgres URL
      - key: REDIS_URL
        value: "rediss://default:YOUR_PASSWORD@your-upstash-endpoint.upstash.io:6379" # Replace with free Upstash Redis URL
      - key: KAFKA_ENABLED
        value: "false" # Disabled to keep it 100% free (Kafka is heavy)
      - key: NEO4J_URI
        value: "neo4j+s://your-instance.databases.neo4j.io" # Replace with free Neo4j Aura DB
      - key: NEO4J_USER
        value: "neo4j"
      - key: NEO4J_PASSWORD
        sync: false # Set in Render Dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: "openai" # Recommended for cloud deployment without heavy local GPU
      - key: OPENAI_API_KEY
        sync: false # User must set this in Render dashboard


