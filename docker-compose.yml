version: '3.8'

services:
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
      - VITE_WS_URL=ws://localhost:8000/api/v1/ws
    depends_on:
      - backend
    networks:
      - afriswarm_net

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://afriswarm:enterprise_password@postgres:5432/afriswarm_db
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - afriswarm_net

  postgres:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_USER: afriswarm
      POSTGRES_PASSWORD: enterprise_password
      POSTGRES_DB: afriswarm_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afriswarm -d afriswarm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - afriswarm_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - afriswarm_net

networks:
  afriswarm_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
